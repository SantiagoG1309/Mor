<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes Especiales</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="mensajes-page">
    <div class="hearts-bg"></div>
    
    <div class="container">
        <header>
            <h1><i class="fas fa-envelope-open-text"></i> Mensajes Especiales <i class="fas fa-envelope-open-text"></i></h1>
            <div class="header-actions">
                <a href="{% url 'mensaje_crear' %}" class="btn btn-add"><i class="fas fa-plus"></i> Nuevo Mensaje</a>
                <a href="{% url 'dashboard' %}" class="btn btn-back"><i class="fas fa-home"></i> Dashboard</a>
            </div>
        </header>
        
        <div class="mensajes-grid">
            {% if mensajes %}
                {% for mensaje in mensajes %}
                <div class="mensaje-card">
                    <div class="mensaje-content">
                        <h2>{{ mensaje.titulo }}</h2>
                        <p class="fecha"><i class="fas fa-calendar-alt"></i> {{ mensaje.fecha }}</p>
                        <div class="mensaje-texto">
                            {{ mensaje.contenido|linebreaks }}
                        </div>
                        <div class="actions-container">
                            <a href="{% url 'mensaje_eliminar' mensaje.id %}" class="btn-delete" onclick="return confirm('¿Estás seguro de que deseas eliminar este mensaje?');"><i class="fas fa-trash-alt"></i></a>
                        </div>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <div class="empty-state">
                    <i class="fas fa-envelope"></i>
                    <p>Aún no hay mensajes especiales. ¡Crea el primero!</p>
                </div>
            {% endif %}
        </div>
    </div>
    
    <script src="{% static 'js/hearts.js' %}"></script>
    <script src="{% static 'js/dark-mode.js' %}"></script>
</body>
</html>
